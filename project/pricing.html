<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyHub — Offres & Abonnements</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* ── Pricing page specific ── */
    .pricing-hero {
      text-align: center;
      padding: 48px 0 40px;
    }
    .pricing-hero h1 { margin-bottom: 12px; }
    .pricing-hero p  { color: var(--text2); font-size: 1.05rem; max-width: 500px; margin: 0 auto; }

    .pricing-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 24px;
      margin-bottom: 48px;
    }

    .pricing-card {
      background: var(--bg2);
      border: 1.5px solid var(--border);
      border-radius: 18px;
      padding: 32px 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }
    .pricing-card:hover {
      border-color: var(--accent);
      transform: translateY(-6px);
      box-shadow: 0 12px 40px rgba(245,158,11,0.15);
    }
    .pricing-card.featured {
      border-color: var(--accent);
      background: linear-gradient(135deg, var(--bg2) 0%, rgba(245,158,11,0.06) 100%);
    }
    .pricing-card.featured::before {
      content: '⭐ MEILLEURE OFFRE';
      position: absolute;
      top: 16px; right: -28px;
      background: var(--accent);
      color: var(--bg);
      font-size: .65rem;
      font-weight: 800;
      letter-spacing: .1em;
      padding: 4px 36px;
      transform: rotate(35deg);
    }
    .pricing-card.unlocked {
      border-color: var(--success);
      background: linear-gradient(135deg, var(--bg2) 0%, rgba(16,185,129,0.06) 100%);
    }

    .plan-icon  { font-size: 2.4rem; }
    .plan-name  { font-family: 'Sora', sans-serif; font-size: 1.2rem; font-weight: 700; }
    .plan-desc  { font-size: .85rem; color: var(--text2); line-height: 1.5; }
    .plan-price {
      display: flex; align-items: baseline; gap: 4px;
      font-family: 'Sora', sans-serif;
    }
    .plan-price .amount { font-size: 2.4rem; font-weight: 800; color: var(--accent); }
    .plan-price .unit   { font-size: .9rem; color: var(--text3); }

    .plan-features { display: flex; flex-direction: column; gap: 8px; flex: 1; }
    .plan-feature  {
      display: flex; align-items: center; gap: 10px;
      font-size: .88rem; color: var(--text2);
    }
    .plan-feature .check { color: var(--success); font-size: 1rem; }

    .plan-btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: .95rem;
      cursor: pointer;
      transition: var(--transition);
      border: none;
      margin-top: auto;
    }
    .plan-btn-primary {
      background: var(--accent);
      color: var(--bg);
    }
    .plan-btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
    .plan-btn-outline {
      background: transparent;
      border: 1.5px solid var(--accent);
      color: var(--accent);
    }
    .plan-btn-outline:hover { background: var(--accent-dim); }
    .plan-btn-success {
      background: rgba(16,185,129,0.15);
      color: var(--success);
      cursor: default;
    }

    /* ── Payment Modal ── */
    .pay-modal-overlay {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.75);
      display: flex; align-items: center; justify-content: center;
      padding: 24px; animation: fadeIn .2s ease;
    }
    .pay-modal-box {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px;
      width: 100%; max-width: 460px;
      box-shadow: var(--shadow-lg);
    }
    .pay-modal-title {
      font-family: 'Sora', sans-serif;
      font-size: 1.3rem; font-weight: 700;
      margin-bottom: 6px;
    }
    .pay-modal-sub { color: var(--text2); font-size: .9rem; margin-bottom: 28px; }

    .card-ui {
      background: linear-gradient(135deg, #1a2a4a 0%, #0f1e38 100%);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }
    .card-ui::before {
      content: '';
      position: absolute; top: -30px; right: -30px;
      width: 120px; height: 120px;
      border-radius: 50%;
      background: rgba(245,158,11,0.08);
    }
    .card-ui-chip  { font-size: 1.8rem; margin-bottom: 16px; }
    .card-ui-number {
      font-family: 'Courier New', monospace;
      font-size: 1.1rem; letter-spacing: .15em;
      color: var(--text); margin-bottom: 16px;
    }
    .card-ui-row   { display: flex; justify-content: space-between; font-size: .8rem; color: var(--text3); }
    .card-ui-brand { font-size: 1.6rem; }

    .card-fields   { display: flex; flex-direction: column; gap: 14px; margin-bottom: 24px; }
    .card-field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .pay-total {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 20px;
      background: var(--accent-dim);
      border: 1px solid rgba(245,158,11,0.25);
      border-radius: 10px;
      margin-bottom: 20px;
    }
    .pay-total-label { font-size: .9rem; color: var(--text2); }
    .pay-total-amount { font-family: 'Sora', sans-serif; font-size: 1.4rem; font-weight: 800; color: var(--accent); }

    .pay-btn {
      width: 100%; padding: 16px;
      background: var(--accent); color: var(--bg);
      border-radius: 12px; border: none;
      font-family: 'Sora', sans-serif; font-weight: 700; font-size: 1rem;
      cursor: pointer; transition: var(--transition);
    }
    .pay-btn:hover { background: var(--accent2); transform: translateY(-1px); }
    .pay-btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    .pay-secure {
      text-align: center; font-size: .75rem; color: var(--text3); margin-top: 12px;
    }

    /* ── Success animation ── */
    .pay-success {
      text-align: center; padding: 20px 0;
    }
    .pay-success-icon {
      font-size: 4rem; margin-bottom: 16px;
      animation: pop .4s cubic-bezier(0.175,0.885,0.32,1.275);
    }
    @keyframes pop {
      0%   { transform: scale(0); }
      100% { transform: scale(1); }
    }
    @keyframes fadeIn {
      from { opacity: 0; } to { opacity: 1; }
    }

    /* ── My subscriptions banner ── */
    .subs-banner {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 32px;
      display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    }
    .subs-banner-title { font-weight: 700; font-size: .95rem; flex: 1; }
    .sub-pill {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(16,185,129,0.12);
      color: var(--success);
      border: 1px solid rgba(16,185,129,0.3);
      border-radius: 50px; padding: 4px 14px; font-size: .8rem; font-weight: 700;
    }
  </style>
</head>
<body>
<div id="toast-container"></div>
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>

  <div class="main-content">
    <header class="topbar">
      <button class="menu-toggle" id="menu-toggle">☰</button>
      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input type="text" id="global-search" placeholder="Rechercher..." autocomplete="off" />
        <div class="search-results hidden" id="search-results"></div>
      </div>
      <div class="topbar-actions">
        <a href="index.html" class="topbar-btn">🏠</a>
        <button class="topbar-btn" onclick="window.location='profile.html'">👤</button>
      </div>
    </header>

    <main class="page-content">
      <div class="breadcrumb" style="margin-bottom:8px">
        <a href="index.html">🏠 Accueil</a> › Abonnements
      </div>

      <div class="pricing-hero">
        <h1>Choisissez votre <span class="text-accent">offre</span> 🎓</h1>
        <p>Accédez à tous les cours, vidéos et documents de votre niveau. Sans engagement.</p>
      </div>

      <!-- Active subscriptions -->
      <div class="subs-banner" id="subs-banner" style="display:none">
        <div>
          <div class="subs-banner-title">✅ Mes abonnements actifs</div>
          <div style="font-size:.82rem;color:var(--text2)">Accès débloqué aux niveaux suivants :</div>
        </div>
        <div id="subs-pills" style="display:flex;gap:8px;flex-wrap:wrap"></div>
      </div>

      <!-- Pricing cards -->
      <div class="pricing-grid" id="pricing-grid"></div>

    </main>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script>
// ── Subscription model ──
const PLANS = [
  {
    id: 'year_1',
    yearId: 1,
    icon: '🌱',
    name: '1ère Année',
    desc: 'Bases fondamentales, introduction aux disciplines principales.',
    price: 50,
    features: ['Toutes les vidéos 1ère Année', 'Tous les documents PDF', 'Suivi de progression', 'Accès illimité'],
    color: '#10b981',
  },
  {
    id: 'year_2',
    yearId: 2,
    icon: '📚',
    name: '2ème Année',
    desc: 'Approfondissement des connaissances et premières spécialisations.',
    price: 50,
    features: ['Toutes les vidéos 2ème Année', 'Tous les documents PDF', 'Suivi de progression', 'Accès illimité'],
    color: '#3b82f6',
  },
  {
    id: 'year_3',
    yearId: 3,
    icon: '🔬',
    name: '3ème Année',
    desc: 'Matières avancées et préparation aux examens nationaux.',
    price: 50,
    features: ['Toutes les vidéos 3ème Année', 'Tous les documents PDF', 'Suivi de progression', 'Accès illimité'],
    color: '#8b5cf6',
  },
  {
    id: 'year_4',
    yearId: 4,
    icon: '🎓',
    name: 'Baccalauréat',
    desc: 'Révision complète et stratégies pour réussir le bac.',
    price: 50,
    features: ['Toutes les vidéos Bac', 'Annales corrigées PDF', 'Suivi de progression', 'Accès illimité'],
    color: '#f59e0b',
  },
  {
    id: 'all',
    yearId: 'all',
    icon: '🌟',
    name: 'Offre Complète',
    desc: 'Accès à tous les niveaux — du lycée au bac. La formule la plus avantageuse.',
    price: 150,
    features: ['Tous les niveaux inclus', '4 années complètes', 'Économisez 50 DT', 'Priorité de support'],
    color: '#f59e0b',
    featured: true,
  },
];


// ── Render pricing cards ──
function renderPricing() {
  const grid = document.getElementById('pricing-grid');
  const activeSubs = SubManager.getAll();

  grid.innerHTML = PLANS.map(plan => {
    const unlocked = SubManager.has(plan.id);
    return `
      <div class="pricing-card ${plan.featured ? 'featured' : ''} ${unlocked ? 'unlocked' : ''}">
        <div class="plan-icon">${plan.icon}</div>
        <div class="plan-name">${plan.name}</div>
        <div class="plan-desc">${plan.desc}</div>
        <div class="plan-price">
          <span class="amount">${plan.price}</span>
          <span class="unit">DT / mois</span>
        </div>
        <div class="plan-features">
          ${plan.features.map(f => `
            <div class="plan-feature">
              <span class="check">✓</span>
              <span>${f}</span>
            </div>`).join('')}
        </div>
        ${unlocked
          ? `<button class="plan-btn plan-btn-success">✅ Abonnement actif</button>`
          : `<button class="plan-btn ${plan.featured ? 'plan-btn-primary' : 'plan-btn-outline'}"
                     onclick="openPayModal('${plan.id}')">
               Souscrire — ${plan.price} DT/mois
             </button>`
        }
      </div>`;
  }).join('');

  // Banner
  if (activeSubs.length) {
    document.getElementById('subs-banner').style.display = 'flex';
    const pills = document.getElementById('subs-pills');
    pills.innerHTML = activeSubs.map(id => {
      const plan = PLANS.find(p => p.id === id);
      return plan ? `<span class="sub-pill">${plan.icon} ${plan.name}</span>` : '';
    }).join('');
  }
}

// ── Payment modal ──
function openPayModal(planId) {
  const plan = PLANS.find(p => p.id === planId);
  if (!plan) return;

  const overlay = document.createElement('div');
  overlay.className = 'pay-modal-overlay';
  overlay.id = 'pay-modal';
  overlay.innerHTML = `
    <div class="pay-modal-box" onclick="event.stopPropagation()">
      <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:20px">
        <div>
          <div class="pay-modal-title">${plan.icon} ${plan.name}</div>
          <div class="pay-modal-sub">Paiement sécurisé par carte bancaire</div>
        </div>
        <button onclick="closePayModal()" style="color:var(--text3);font-size:1.4rem;padding:4px 8px;border-radius:6px;cursor:pointer">✕</button>
      </div>

      <!-- Card visual -->
      <div class="card-ui">
        <div class="card-ui-chip">💳</div>
        <div class="card-ui-number" id="card-display">•••• •••• •••• ••••</div>
        <div class="card-ui-row">
          <div>
            <div style="font-size:.65rem;margin-bottom:2px;color:var(--text3)">TITULAIRE</div>
            <div id="card-name-display" style="font-size:.82rem;color:var(--text)">VOTRE NOM</div>
          </div>
          <div>
            <div style="font-size:.65rem;margin-bottom:2px;color:var(--text3)">EXPIRE</div>
            <div id="card-exp-display" style="font-size:.82rem;color:var(--text)">MM/AA</div>
          </div>
          <div class="card-ui-brand">💳</div>
        </div>
      </div>

      <!-- Fields -->
      <div class="card-fields">
        <div class="form-group" style="margin:0">
          <label class="form-label">Numéro de carte</label>
          <input class="form-input" id="f-card-num" placeholder="1234 5678 9012 3456" maxlength="19"
                 oninput="fmtCard(this)" style="font-family:'Courier New',monospace;letter-spacing:.1em" />
        </div>
        <div class="form-group" style="margin:0">
          <label class="form-label">Nom du titulaire</label>
          <input class="form-input" id="f-card-name" placeholder="PRÉNOM NOM"
                 oninput="document.getElementById('card-name-display').textContent=this.value.toUpperCase()||'VOTRE NOM'" />
        </div>
        <div class="card-field-row">
          <div class="form-group" style="margin:0">
            <label class="form-label">Date d'expiration</label>
            <input class="form-input" id="f-card-exp" placeholder="MM/AA" maxlength="5"
                   oninput="fmtExp(this)" />
          </div>
          <div class="form-group" style="margin:0">
            <label class="form-label">CVV</label>
            <input class="form-input" id="f-card-cvv" placeholder="•••" maxlength="3" type="password" />
          </div>
        </div>
      </div>

      <!-- Total -->
      <div class="pay-total">
        <span class="pay-total-label">Total à payer</span>
        <span class="pay-total-amount">${plan.price} DT / mois</span>
      </div>

      <button class="pay-btn" id="pay-btn" onclick="processPay('${plan.id}')">
        🔒 Payer ${plan.price} DT
      </button>
      <div class="pay-secure">🔒 Paiement simulé — aucune donnée réelle transmise</div>
    </div>`;

  document.body.appendChild(overlay);
  overlay.addEventListener('click', closePayModal);
}

function fmtCard(input) {
  let v = input.value.replace(/\D/g, '').substring(0, 16);
  input.value = v.replace(/(.{4})/g, '$1 ').trim();
  const display = v.padEnd(16, '•').replace(/(.{4})/g, '$1 ').trim();
  document.getElementById('card-display').textContent = display;
}

function fmtExp(input) {
  let v = input.value.replace(/\D/g, '');
  if (v.length >= 2) v = v.substring(0,2) + '/' + v.substring(2,4);
  input.value = v;
  document.getElementById('card-exp-display').textContent = v || 'MM/AA';
}

function closePayModal() {
  document.getElementById('pay-modal')?.remove();
}

function processPay(planId) {
  const plan = PLANS.find(p => p.id === planId);
  const btn  = document.getElementById('pay-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Traitement en cours...';

  // Simulate payment processing delay
  setTimeout(() => {
    SubManager.add(planId);

    // If all years individually → also unlock
    const allYears = ['year_1','year_2','year_3','year_4'];
    const subs = SubManager.getAll();
    if (allYears.every(y => subs.includes(y))) SubManager.add('all');

    // Show success
    const box = document.querySelector('.pay-modal-box');
    box.innerHTML = `
      <div class="pay-success">
        <div class="pay-success-icon">🎉</div>
        <h3 style="font-family:'Sora',sans-serif;margin-bottom:8px">Paiement réussi !</h3>
        <p style="color:var(--text2);margin-bottom:24px">
          Votre accès à <strong>${plan.name}</strong> est maintenant actif.
        </p>
        <button class="pay-btn" onclick="closePayModal();renderPricing()">
          ✅ Accéder aux cours
        </button>
      </div>`;

    AppController.toast(`🎉 Accès ${plan.name} débloqué !`, 'success', 4000);
  }, 1800);
}

document.addEventListener('DOMContentLoaded', () => {
  if (!AuthController.currentUser()) {
    sessionStorage.setItem('redirect', 'pricing.html');
    window.location.href = 'login.html';
    return;
  }
  renderPricing();
});
</script>
</body>
</html>
