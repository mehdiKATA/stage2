<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyHub — Tableau de bord</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div id="toast-container"></div>
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>

  <div class="main-content">
    <header class="topbar">
      <button class="menu-toggle" id="menu-toggle">☰</button>
      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input type="text" id="global-search" placeholder="Rechercher une matière, un cours..." autocomplete="off" />
        <div class="search-results hidden" id="search-results"></div>
      </div>
      <div class="topbar-actions">
        <!-- Bell with badge -->
        <button class="topbar-btn" id="btn-notif" title="Notifications" style="position:relative">
          🔔
          <span id="notif-badge" style="
            display:none; position:absolute; top:-4px; right:-4px;
            background:var(--danger); color:#fff; border-radius:50%;
            width:18px; height:18px; font-size:.62rem; font-weight:800;
            align-items:center; justify-content:center; pointer-events:none;
          "></span>
        </button>
        <button class="topbar-btn" onclick="window.location='profile.html'" title="Profil">👤</button>
      </div>
    </header>

    <main class="page-content">
      <div class="page-header">
        <h1 id="welcome-title">Bienvenue sur <span class="text-accent">StudyHub</span> 👋</h1>
        <p id="welcome-sub">Choisissez votre niveau pour commencer à réviser.</p>
      </div>

      <!-- Stats row -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">Vidéos regardées</div>
          <div class="stat-value" id="stat-watched">—</div>
          <div class="stat-sub">Total</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Matières suivies</div>
          <div class="stat-value" id="stat-subjects">—</div>
          <div class="stat-sub">En progression</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Niveaux disponibles</div>
          <div class="stat-value">4</div>
          <div class="stat-sub">Du lycée au bac</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Documents PDF</div>
          <div class="stat-value" id="stat-docs">—</div>
          <div class="stat-sub">Fiches & annales</div>
        </div>
      </div>

      <!-- Year cards -->
      <div class="section-title" id="years">
        <h2>📂 Choisissez votre niveau</h2>
      </div>
      <div class="cards-grid" id="years-grid"></div>
    </main>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script src="js/dashboard.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const user = AuthController.currentUser();
    if (user) {
      document.getElementById('welcome-title').innerHTML =
        `Bonjour, <span class="text-accent">${user.username}</span> 👋`;
      document.getElementById('welcome-sub').textContent =
        'Continuez là où vous vous êtes arrêté(e).';
    }
  });
</script>
</body>
</html>
